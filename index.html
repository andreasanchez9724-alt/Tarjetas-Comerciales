<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>CONALCA — Tarjetas Digitales</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;
  --border:#2e2e2e;--border2:#3a3a3a;
  --blue:#3b7eff;--blue-d:rgba(59,126,255,.14);
  --green:#22c55e;--green-d:rgba(34,197,94,.13);
  --red:#ef4444;--red-d:rgba(239,68,68,.12);
  --yellow:#f59e0b;--yellow-d:rgba(245,158,11,.12);
  --wa:#25d166;--wa-d:rgba(37,209,102,.13);
  --text:#f0ede6;--text2:#9c9890;--text3:#5c5a56;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* PANTALLA PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:24px;padding-top:calc(24px + var(--safe-top))}
#pin-screen.hide{display:none}
.logo{width:72px;height:72px;background:var(--blue);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.logo svg{width:40px;height:40px;color:#fff}
.pin-title{font-size:20px;font-weight:700;margin-bottom:4px;text-align:center}
.pin-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--border2);transition:background .15s,transform .1s}
.pin-dot.on{background:var(--blue);transform:scale(1.1)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px;margin-bottom:14px}
.pin-key{height:56px;border-radius:14px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:22px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .1s,transform .08s}
.pin-key:active{background:var(--border2);transform:scale(.95)}
.pin-key.wide{grid-column:span 2}
.pin-key.del{font-size:16px;color:var(--text2)}
.pin-err{font-size:13px;color:var(--red);min-height:20px;text-align:center}
.pin-skip{margin-top:18px;font-size:13px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 16px;border-radius:8px}

/* APP */
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}
#app.hide{display:none}

/* TOPBAR */
.topbar{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,15,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;padding-top:calc(14px + var(--safe-top))}
.topbar h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar p{font-size:12px;color:var(--text3);margin-top:1px}
.admin-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(245,158,11,.15);color:var(--yellow);border-radius:20px;font-size:11px;font-weight:500}
.topbar-right{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:opacity .15s}
.btn-icon:active{opacity:.7}
.btn-icon svg{width:20px;height:20px}
.btn-icon.primary{background:var(--blue)}
.btn-icon.ghost{background:var(--surface2);color:var(--text2)}

/* CONTENIDO */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px calc(20px + var(--safe-bottom))}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;color:var(--text3);padding:24px}
.empty svg{width:52px;height:52px;opacity:.2;margin-bottom:14px}
.empty h3{font-size:16px;color:var(--text2);font-weight:500;margin-bottom:6px}
.empty p{font-size:13px;line-height:1.55}

/* LISTA */
.cards-list{display:flex;flex-direction:column;gap:12px}

/* TARJETA */
.biz-card{background:linear-gradient(145deg,#1e1c18,#131210);border:0.5px solid #2a2620;border-radius:16px;padding:18px;position:relative;overflow:hidden}
.biz-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--blue),#7aaeff)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-name{font-size:16px;font-weight:600;color:#f5f2ec;line-height:1.2}
.card-role{font-size:12px;color:#7aaeff;margin-top:3px}
.card-company{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-top:7px}
.qr-wrap{background:#fff;border-radius:8px;padding:5px;flex-shrink:0;width:70px;height:70px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-div{height:0.5px;background:#2a2620;margin:13px 0 10px}
.card-contacts{display:flex;flex-direction:column;gap:5px}
.crow{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#c5c0b6}
.crow svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}

/* ACCIONES */
.card-actions{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.cta{flex:1;min-width:80px;padding:9px 6px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;border:none;-webkit-user-select:none;user-select:none}
.cta:active{opacity:.7}
.cta svg{width:14px;height:14px;flex-shrink:0}
.cta-wa{background:var(--wa-d);color:var(--wa)}
.cta-blue{background:var(--blue-d);color:var(--blue)}
.cta-gray{background:var(--surface2);color:var(--text2)}
.cta-red{flex:0 0 auto;padding:9px 11px;background:var(--red-d);color:var(--red)}

/* ENLACE COPIADO TOAST */
#toast{position:fixed;bottom:calc(24px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(12px);background:#1e1e1e;border:0.5px solid var(--border2);color:var(--text);font-size:13.5px;padding:10px 18px;border-radius:30px;white-space:nowrap;z-index:600;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* VISTA INDIVIDUAL (cuando se accede con ?id=) */
#card-view{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px calc(24px + var(--safe-bottom));padding-top:calc(24px + var(--safe-top))}
#card-view.show{display:flex}
.single-card{background:linear-gradient(145deg,#1e1c18,#131210);border:0.5px solid #2a2620;border-radius:24px;padding:28px 24px 22px;width:100%;max-width:360px;position:relative;overflow:hidden}
.single-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),#7aaeff)}
.single-top{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
.single-info{flex:1;min-width:0}
.single-name{font-size:20px;font-weight:700;color:#f5f2ec;line-height:1.2;margin-bottom:4px}
.single-role{font-size:13px;color:#7aaeff;margin-bottom:3px}
.single-company{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:6px}
.single-qr{background:#fff;border-radius:12px;padding:8px;flex-shrink:0;width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.single-div{height:0.5px;background:#2a2620;margin:0 0 16px}
.single-contacts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.single-crow{display:flex;align-items:center;gap:10px;font-size:13px;color:#c5c0b6}
.single-crow svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.single-actions{display:flex;gap:9px}
.sbtn{flex:1;padding:13px 6px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.sbtn:active{opacity:.75}
.sbtn svg{width:15px;height:15px}
.sbtn-green{background:rgba(34,197,94,.14);color:var(--green)}
.sbtn-blue{background:var(--blue-d);color:var(--blue)}
.install-tip{margin-top:14px;font-size:11.5px;color:var(--text3);text-align:center;line-height:1.5}

/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.overlay.show{opacity:1;visibility:visible}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border2);z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0);max-height:92vh;overflow-y:auto;padding-bottom:var(--safe-bottom)}
.sheet.show{transform:translateY(0);transition-timing-function:cubic-bezier(.33,1,.68,1)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-head{font-size:16px;font-weight:600;padding:14px 20px;border-bottom:0.5px solid var(--border)}
.sheet-body{padding:16px 18px 8px}
.sfield{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
.sfield label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.55px}
.sfield input{height:44px;padding:0 14px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;font-size:15px;color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.sfield input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,255,.18)}
.sfield input::placeholder{color:var(--text3)}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ferr{font-size:12.5px;color:#f87171;background:var(--red-d);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none}
.sheet-foot{display:flex;gap:10px;padding:12px 18px 18px;border-top:0.5px solid var(--border)}
.btn-cancel{flex:1;padding:13px;background:var(--surface2);border:none;color:var(--text2);border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-save{flex:2;padding:13px;background:var(--blue);border:none;color:#fff;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* URL PANEL */
.url-panel{background:var(--surface);border:0.5px solid var(--border2);border-radius:12px;padding:14px;margin-top:10px;display:none}
.url-panel.show{display:block}
.url-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.url-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text2);word-break:break-all;line-height:1.4}
.url-copy{flex-shrink:0;padding:6px 12px;background:var(--blue-d);color:var(--blue);border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.url-wa{width:100%;margin-top:8px;padding:10px;background:var(--wa-d);color:var(--wa);border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}

@media(max-width:360px){.srow{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- VISTA INDIVIDUAL (cuando se abre con ?id=nombre) -->
<div id="card-view">
  <div class="single-card" id="single-card">
    <div class="single-top">
      <div class="single-info">
        <div class="single-name" id="s-name"></div>
        <div class="single-role" id="s-role"></div>
        <div class="single-company" id="s-company"></div>
      </div>
      <div class="single-qr" id="s-qr"></div>
    </div>
    <div class="single-div"></div>
    <div class="single-contacts" id="s-contacts"></div>
    <div class="single-actions">
      <button class="sbtn sbtn-green" id="s-vcf" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Guardar contacto
      </button>
      <button class="sbtn sbtn-blue" id="s-qrdl" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar QR
      </button>
    </div>
    <p class="install-tip">Escanea el QR con la cámara · Para instalar como app: Compartir → Añadir a pantalla de inicio</p>
  </div>
</div>

<!-- PANTALLA PIN -->
<div id="pin-screen">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2.2"/>
      <path d="M15 9h3M15 13h2M7.5 16c0-1 .9-1.8 1.8-1.8h1.4c1 0 1.8.8 1.8 1.8"/>
    </svg>
  </div>
  <h1 class="pin-title">CONALCA</h1>
  <p class="pin-sub">Panel de administración</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-key" data-n="1" type="button">1</button>
    <button class="pin-key" data-n="2" type="button">2</button>
    <button class="pin-key" data-n="3" type="button">3</button>
    <button class="pin-key" data-n="4" type="button">4</button>
    <button class="pin-key" data-n="5" type="button">5</button>
    <button class="pin-key" data-n="6" type="button">6</button>
    <button class="pin-key" data-n="7" type="button">7</button>
    <button class="pin-key" data-n="8" type="button">8</button>
    <button class="pin-key" data-n="9" type="button">9</button>
    <button class="pin-key wide" data-n="0" type="button">0</button>
    <button class="pin-key del" id="pin-del" type="button">⌫</button>
  </div>
  <p class="pin-err" id="pin-err"></p>
  <button class="pin-skip" id="pin-skip" type="button">Solo ver las tarjetas →</button>
</div>

<!-- APP ADMIN -->
<div id="app" class="hide">
  <div class="topbar">
    <div>
      <h1 id="topbar-title">CONALCA</h1>
      <p id="subtitle">—</p>
    </div>
    <div class="topbar-right">
      <button class="btn-icon ghost" id="btn-exit" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
      <button class="btn-icon primary" id="btn-add" type="button" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  <div id="content">
    <div class="empty" id="empty" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2"/><path d="M15 9h2M15 13h2M7 16c0-1.1.9-2 2-2h2a2 2 0 0 1 2 2"/></svg>
      <h3>Sin tarjetas</h3>
      <p>Toca el + para agregar</p>
    </div>
    <div class="cards-list" id="cards-list"></div>
  </div>
</div>

<!-- SHEET FORMULARIO -->
<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head" id="sheet-head">Nueva tarjeta</div>
  <div class="sheet-body">
    <p class="ferr" id="ferr">Completa el nombre y el teléfono.</p>
    <div class="srow">
      <div class="sfield"><label>Nombre *</label><input type="text" id="f-nombre" placeholder="María" autocomplete="off"/></div>
      <div class="sfield"><label>Apellido</label><input type="text" id="f-apellido" placeholder="González" autocomplete="off"/></div>
    </div>
    <div class="sfield"><label>Cargo</label><input type="text" id="f-cargo" placeholder="Gerente de Cuenta" autocomplete="off"/></div>
    <div class="sfield"><label>Empresa</label><input type="text" id="f-empresa" placeholder="CONALCA S.A.S." autocomplete="off"/></div>
    <div class="sfield"><label>Teléfono *</label><input type="tel" id="f-telefono" placeholder="+57 300 000 0000" inputmode="tel"/></div>
    <div class="sfield"><label>Correo</label><input type="email" id="f-correo" placeholder="correo@conalca.com.co" inputmode="email"/></div>
    <div class="sfield"><label>Sitio web</label><input type="text" id="f-web" placeholder="www.conalca.com.co" autocomplete="off"/></div>
  </div>
  <div class="sheet-foot">
    <button class="btn-cancel" id="btn-cancel" type="button">Cancelar</button>
    <button class="btn-save" id="btn-save" type="button">Guardar</button>
  </div>
</div>

<div id="toast"></div>

  function slug(n){
    return n.toLowerCase()
      .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
      .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n')

  /* QR HELPER */
  function makeQR(container, text, size){

    }catch(e){
      container.innerHTML='<div style="width:'+size+'px;height:'+size+'px;background:#fff"></div>';
    }

  /* vCARD */
  function buildVCard(p){
    var fn = p.nombre+(p.apellido?' '+p.apellido:'');
    var l  = ['BEGIN:VCARD','VERSION:3.0','N:'+p.apellido+';'+p.nombre+';;;','FN:'+fn];
    if(p.empresa) l.push('ORG:'+p.empresa);
    if(p.cargo)   l.push('TITLE:'+p.cargo);
    if(p.telefono)l.push('TEL;TYPE=CELL:'+p.telefono);
    if(p.correo)  l.push('EMAIL:'+p.correo);
    if(p.web){var u=p.web;if(!/^https?:\/\//i.test(u))u='https://'+u;l.push('URL:'+u);}
    l.push('END:VCARD');
    return l.join('\r\n');
  }

  function dlBlob(name,content,mime){
    var blob=new Blob([content],{type:mime});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},2000);
  }

  function updateDots(){

    el('pin-err').textContent=msg;

    setTimeout(function(){el('pin-err').textContent='';},1800);
  }

      var ct=document.createElement('div');ct.className='card-contacts';
      if(p.telefono)ct.innerHTML+='<div class="crow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.128.6.266 1.17.418 1.71a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.54.152 1.11.29 1.71.418A2 2 0 0 1 22 16.92z"/></svg>'+p.telefono+'</div>';
      if(p.correo)ct.innerHTML+='<div class="crow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>'+p.correo+'</div>';
      card.appendChild(top);card.appendChild(dv);card.appendChild(ct);

      /* Panel de URL */
      var urlPanel=document.createElement('div');urlPanel.className='url-panel show';
      urlPanel.innerHTML='<div class="url-label">Enlace de esta tarjeta</div>'
        +'<div class="url-box"><span style="flex:1">'+url+'</span>'
        +'<button class="url-copy" data-url="'+url+'" type="button">Copiar</button></div>'
        +'<button class="url-wa" data-url="'+url+'" data-nombre="'+p.nombre.split(' ')[0]+'" type="button">'
        +'<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.571a.75.75 0 0 0 .916.932l5.909-1.548A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.726 9.726 0 0 1-4.961-1.355l-.355-.212-3.683.965.981-3.588-.232-.369A9.722 9.722 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>'
        +' Enviar por WhatsApp</button>';

      card.appendChild(urlPanel);

      var act=document.createElement('div');act.className='card-actions';
      if(isAdmin){
        var bEdit=document.createElement('button');bEdit.type='button';bEdit.className='cta cta-gray';
        bEdit.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar';
        bEdit.addEventListener('click',function(){openSheet(people[idx],idx);});
        var bDel=document.createElement('button');bDel.type='button';bDel.className='cta cta-red';
        bDel.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>';
        bDel.addEventListener('click',function(){if(confirm('¿Eliminar?')){people.splice(idx,1);save();render();}});
        act.appendChild(bEdit);act.appendChild(bDel);
      }
      wrap.appendChild(card);wrap.appendChild(act);
      list.appendChild(wrap);
      makeQR(qw,vc,60);

      /* Eventos copiar / WhatsApp */
      urlPanel.querySelector('.url-copy').addEventListener('click',function(){
        var u=this.dataset.url;
        navigator.clipboard.writeText(u).then(function(){toast('Enlace copiado ✓');}).catch(function(){toast(u);});
      });
      urlPanel.querySelector('.url-wa').addEventListener('click',function(){
        var u=this.dataset.url;
        var nombre=this.dataset.nombre;
        var msg='Hola '+nombre+' 👋\n\nTe comparto tu tarjeta digital de CONALCA:\n\n'+u+'\n\nÁbrela en el navegador para ver tu QR y guardar tu contacto. También puedes instalarla como app en tu celular 📱';
        window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
      });
    });
  }

  render();
})();
</script>
</body>
</html>
