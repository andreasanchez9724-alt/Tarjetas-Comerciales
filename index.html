<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tarjetas">
<meta name="theme-color" content="#0f0f0f">
<title>Tarjetas Digitales</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;
  --border:#2e2e2e;--border2:#383838;
  --blue:#3b7eff;--blue-dim:rgba(59,126,255,.14);
  --green:#22c55e;--green-dim:rgba(34,197,94,.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,.12);
  --text:#f0ede6;--text2:#9c9890;--text3:#5c5a56;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s,visibility .4s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-icon{width:80px;height:80px;background:var(--blue);border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.splash-icon svg{width:44px;height:44px;color:#fff}
#splash h1{font-size:22px;font-weight:600;margin-bottom:5px}
#splash p{font-size:14px;color:var(--text3)}

/* ── PIN MODAL ── */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.pin-overlay.show{display:flex}
.pin-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:28px 24px;width:min(320px,90vw);text-align:center}
.pin-box h2{font-size:16px;font-weight:600;margin-bottom:6px}
.pin-box p{font-size:13px;color:var(--text3);margin-bottom:20px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);transition:background .15s}
.pin-dot.filled{background:var(--blue)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pin-key{height:52px;border-radius:12px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);font-size:20px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .1s}
.pin-key:active{background:var(--border2)}
.pin-key.wide{grid-column:span 2}
.pin-key.del{font-size:15px;color:var(--text2)}
.pin-err{font-size:12.5px;color:var(--red);min-height:18px;margin-top:2px}
.pin-cancel{margin-top:10px;font-size:13px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:inherit;padding:6px}

/* ── SCREENS ── */
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-top:calc(var(--safe-top) + 8px)}
.screen.active{display:block}

/* ── NAV ── */
#nav{flex-shrink:0;background:rgba(26,26,26,.96);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;cursor:pointer;color:var(--text3);font-size:10.5px;font-weight:500;transition:color .15s;border:none;background:none;font-family:inherit}
.nav-item.active{color:var(--blue)}
.nav-item svg{width:22px;height:22px}

/* ── TOPBAR ── */
.topbar{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(15,15,15,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:10;border-bottom:0.5px solid var(--border)}
.topbar-info h1{font-size:17px;font-weight:600}
.topbar-info p{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;background:var(--blue);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:opacity .15s}
.btn-icon:active{opacity:.75}
.btn-icon svg{width:20px;height:20px}
.btn-icon.ghost{background:var(--surface2);color:var(--text2)}

/* ── ADMIN BADGE ── */
.admin-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(245,158,11,.15);color:var(--yellow);border-radius:20px;font-size:11px;font-weight:500;margin-left:8px}

/* ── LISTA ── */
.list-content{padding:12px 14px 24px;display:flex;flex-direction:column;gap:12px}

/* ── TARJETA ── */
.biz-card{background:linear-gradient(145deg,#1e1c18,#131210);border:0.5px solid #2a2620;border-radius:16px;padding:18px;position:relative;overflow:hidden}
.biz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--blue),#7aaeff)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.card-name{font-size:16px;font-weight:600;color:#f5f2ec;line-height:1.2}
.card-role{font-size:12px;color:#7aaeff;margin-top:3px}
.card-company{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-top:7px}
.qr-wrap{background:#fff;border-radius:8px;padding:5px;flex-shrink:0;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.qr-wrap svg{display:block}
.card-div{height:0.5px;background:#2a2620;margin:13px 0 10px}
.card-contacts{display:flex;flex-direction:column;gap:5px}
.contact-row{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#c5c0b6}
.contact-row svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}

/* ACCIONES */
.card-actions{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.cta{flex:1;min-width:0;padding:9px 6px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;border:none;transition:opacity .15s}
.cta:active{opacity:.7}
.cta svg{width:14px;height:14px;flex-shrink:0}
.cta-green{background:var(--green-dim);color:var(--green)}
.cta-wa{background:rgba(37,211,102,.14);color:#25d166;font-size:11.5px}
.cta-blue{background:var(--blue-dim);color:var(--blue)}
.cta-yellow{background:var(--yellow-dim);color:var(--yellow)}
.cta-gray{background:var(--surface2);color:var(--text2)}
.cta-red{flex:0 0 auto;padding:9px 11px;background:var(--red-dim);color:var(--red)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;color:var(--text3);min-height:50vh}
.empty svg{width:52px;height:52px;opacity:.2;margin-bottom:16px}
.empty h3{font-size:16px;color:var(--text2);font-weight:500;margin-bottom:5px}
.empty p{font-size:13px;line-height:1.5}

/* ── SHEET FORMULARIO ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.sheet-overlay.show{opacity:1;visibility:visible}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border2);z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,0,.67,0);max-height:92vh;overflow-y:auto;padding-bottom:var(--safe-bottom)}
.sheet.show{transform:translateY(0);transition-timing-function:cubic-bezier(.33,1,.68,1)}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.sheet-title{font-size:16px;font-weight:600;color:var(--text);padding:14px 20px 14px;border-bottom:0.5px solid var(--border)}
.sheet-body{padding:16px 18px 8px}
.sfield{display:flex;flex-direction:column;gap:6px;margin-bottom:13px}
.sfield label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.55px}
.sfield input{height:44px;padding:0 14px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;font-size:15px;color:var(--text);font-family:inherit;-webkit-appearance:none}
.sfield input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,126,255,.18)}
.sfield input::placeholder{color:var(--text3)}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-err{font-size:12.5px;color:#f87171;background:var(--red-dim);border-radius:8px;padding:9px 12px;margin-bottom:12px;display:none}
.sheet-actions{display:flex;gap:10px;padding:12px 18px 18px;border-top:0.5px solid var(--border)}
.btn-cancel{flex:1;padding:13px;background:var(--surface2);border:none;color:var(--text2);border-radius:12px;font-size:15px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-save{flex:2;padding:13px;background:var(--blue);border:none;color:#fff;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* TOAST */
#toast{position:fixed;bottom:calc(80px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(16px);background:#1e1e1e;border:0.5px solid var(--border2);color:var(--text);font-size:13.5px;padding:10px 18px;border-radius:30px;white-space:nowrap;z-index:300;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2.2"/>
      <path d="M15 9h3M15 13h2M7.5 16c0-1 .9-1.8 1.8-1.8h1.4c1 0 1.8.8 1.8 1.8"/>
    </svg>
  </div>
  <h1>Tarjetas Digitales</h1>
  <p>Tu equipo en un escaneo</p>
</div>

<!-- PIN MODAL -->
<div class="pin-overlay" id="pin-overlay">
  <div class="pin-box">
    <h2>Acceso admin</h2>
    <p>Ingresa el PIN para gestionar todas las tarjetas</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid" id="pin-grid">
      <button class="pin-key" data-n="1" type="button">1</button>
      <button class="pin-key" data-n="2" type="button">2</button>
      <button class="pin-key" data-n="3" type="button">3</button>
      <button class="pin-key" data-n="4" type="button">4</button>
      <button class="pin-key" data-n="5" type="button">5</button>
      <button class="pin-key" data-n="6" type="button">6</button>
      <button class="pin-key" data-n="7" type="button">7</button>
      <button class="pin-key" data-n="8" type="button">8</button>
      <button class="pin-key" data-n="9" type="button">9</button>
      <button class="pin-key wide" data-n="0" type="button">0</button>
      <button class="pin-key del" id="pin-del" type="button">⌫</button>
    </div>
    <p class="pin-err" id="pin-err"></p>
    <button class="pin-cancel" id="pin-cancel" type="button">Cancelar</button>
  </div>
</div>

<!-- SCREENS -->
<div id="screens">

  <!-- PANTALLA: TARJETAS -->
  <div class="screen active" id="screen-cards">
    <div class="topbar">
      <div class="topbar-info">
        <h1>Mi equipo <span id="admin-badge" class="admin-badge" style="display:none">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Admin
        </span></h1>
        <p id="subtitle">Cargando...</p>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon ghost" id="btn-lock" type="button" aria-label="Entrar como admin" title="Panel de administración">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
        <button class="btn-icon" id="btn-add" type="button" aria-label="Agregar persona" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="empty" class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2"/>
        <path d="M15 9h2M15 13h2M7 16c0-1.1.9-2 2-2h2a2 2 0 0 1 2 2"/>
      </svg>
      <h3>Sin tarjetas todavía</h3>
      <p>Entra como admin con el candado 🔒 para agregar personas</p>
    </div>
    <div class="list-content" id="cards-list"></div>
  </div>

</div>

<!-- NAV -->
<nav id="nav">
  <button class="nav-item active" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="9" cy="10" r="2"/>
      <path d="M15 9h2M15 13h2M7 16c0-1.1.9-2 2-2h2a2 2 0 0 1 2 2"/>
    </svg>
    Tarjetas
  </button>
</nav>

<!-- SHEET FORMULARIO -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Nueva tarjeta</div>
  <div class="sheet-body">
    <p class="form-err" id="form-err">Completa el nombre y el teléfono.</p>
    <div class="srow">
      <div class="sfield"><label>Nombre *</label><input type="text" id="f-nombre" placeholder="María" autocomplete="off" autocorrect="off"/></div>
      <div class="sfield"><label>Apellido</label><input type="text" id="f-apellido" placeholder="González" autocomplete="off" autocorrect="off"/></div>
    </div>
    <div class="sfield"><label>Cargo</label><input type="text" id="f-cargo" placeholder="Directora Comercial" autocomplete="off" autocorrect="off"/></div>
    <div class="sfield"><label>Empresa</label><input type="text" id="f-empresa" placeholder="Mi empresa S.A.S." autocomplete="off" autocorrect="off"/></div>
    <div class="sfield"><label>Teléfono *</label><input type="tel" id="f-telefono" placeholder="+57 300 000 0000" inputmode="tel"/></div>
    <div class="sfield"><label>Correo</label><input type="email" id="f-correo" placeholder="correo@empresa.com" inputmode="email"/></div>
    <div class="sfield"><label>Sitio web</label><input type="text" id="f-web" placeholder="www.miempresa.com" autocomplete="off" inputmode="url"/></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-cancel" id="btn-cancel" type="button">Cancelar</button>
    <button class="btn-save" id="btn-save" type="button">Guardar</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ================================================================
   MOTOR QR — JS PURO, SIN DEPENDENCIAS, FUNCIONA OFFLINE
   ================================================================ */
var QRMaker=(function(){
  var EX=new Array(256),LG=new Array(256);
  for(var i=0;i<8;i++)EX[i]=1<<i;
  for(var i=8;i<256;i++)EX[i]=EX[i-4]^EX[i-5]^EX[i-6]^EX[i-8];
  for(var i=0;i<255;i++)LG[EX[i]]=i;
  function gx(n){while(n<0)n+=255;while(n>=256)n-=255;return EX[n];}
  function gl(n){if(n<1)throw 0;return LG[n];}
  function Poly(a,s){var o=0;while(o<a.length&&a[o]===0)o++;this.v=new Array(a.length-o+s);for(var i=0;i<a.length-o;i++)this.v[i]=a[i+o];for(var i=0;i<s;i++)this.v[a.length-o+i]=0;}
  Poly.prototype={g:function(i){return this.v[i];},l:function(){return this.v.length;},
    mul:function(e){var n=new Array(this.l()+e.l()-1);for(var i=0;i<n.length;i++)n[i]=0;for(var i=0;i<this.l();i++)for(var j=0;j<e.l();j++)n[i+j]^=gx(gl(this.g(i))+gl(e.g(j)));return new Poly(n,0);},
    mod:function(e){if(this.l()-e.l()<0)return this;var r=gl(this.g(0))-gl(e.g(0));var n=this.v.slice();for(var i=0;i<e.l();i++)n[i]^=gx(gl(e.g(i))+r);return new Poly(n,0).mod(e);}};
  function ecp(n){var e=new Poly([1],0);for(var i=0;i<n;i++)e=e.mul(new Poly([1,gx(i)],0));return e;}
  var PPT=[[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54],[6,32,58],[6,34,62],[6,26,46,66],[6,26,48,70],[6,26,50,74],[6,30,54,78],[6,30,56,82],[6,30,58,86],[6,34,62,90],[6,28,50,72,94]];
  var G15=(1<<10)|(1<<8)|(1<<5)|(1<<4)|(1<<2)|(1<<1)|1,G18=(1<<12)|(1<<11)|(1<<10)|(1<<9)|(1<<8)|(1<<5)|(1<<2)|1,G15M=(1<<14)|(1<<12)|(1<<10)|(1<<4)|(1<<1);
  function bd(d){var x=0;while(d!==0){x++;d>>>=1;}return x;}
  function bchTI(d){var r=d<<10;while(bd(r)-bd(G15)>=0)r^=(G15<<(bd(r)-bd(G15)));return((d<<10)|r)^G15M;}
  function bchTN(d){var r=d<<12;while(bd(r)-bd(G18)>=0)r^=(G18<<(bd(r)-bd(G18)));return(d<<12)|r;}
  function mk(p,r,c){switch(p){case 0:return(r+c)%2===0;case 1:return r%2===0;case 2:return c%3===0;case 3:return(r+c)%3===0;case 4:return(Math.floor(r/2)+Math.floor(c/3))%2===0;case 5:return(r*c)%2+(r*c)%3===0;case 6:return((r*c)%2+(r*c)%3)%2===0;case 7:return((r*c)%3+(r+c)%2)%2===0;}}
  var RSM=[[1,26,16],[1,44,28],[1,70,44],[2,50,32],[2,67,43],[4,43,27],[4,49,31],[2,60,38,2,61,39],[3,58,36,2,59,37],[4,69,43,1,70,44],[1,80,50,4,81,51],[6,58,36,2,59,37],[8,59,37,1,60,38],[4,64,40,5,65,41],[5,65,41,5,66,42],[7,73,45,3,74,46],[10,74,46,1,75,47],[9,69,43,4,70,44],[3,70,44,11,71,45],[3,67,41,13,68,42],[4,69,43,1,70,44]];
  function rsb(tn){var t=RSM[tn-1],n=t.length/3,l=[];for(var i=0;i<n;i++){var c=t[i*3],tc=t[i*3+1],dc=t[i*3+2];for(var j=0;j<c;j++)l.push({tc:tc,dc:dc});}return l;}
  function BB(){this.b=[];this.n=0;}
  BB.prototype={put:function(v,l){for(var i=0;i<l;i++)this.bit(((v>>>(l-i-1))&1)===1);},bit:function(b){var i=Math.floor(this.n/8);if(this.b.length<=i)this.b.push(0);if(b)this.b[i]|=(0x80>>>(this.n%8));this.n++;}};
  function utf8(s){var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<0x80)b.push(c);else if(c<0x800)b.push(0xC0|(c>>6),0x80|(c&0x3F));else b.push(0xE0|(c>>12),0x80|((c>>6)&0x3F),0x80|(c&0x3F));}return b;}
  function makeData(tn,bytes){
    var blocks=rsb(tn),buf=new BB();
    buf.put(4,4);buf.put(bytes.length,8);
    for(var i=0;i<bytes.length;i++)buf.put(bytes[i],8);
    var tdc=0;for(var i=0;i<blocks.length;i++)tdc+=blocks[i].dc;
    if(buf.n+4<=tdc*8)buf.put(0,4);
    while(buf.n%8!==0)buf.bit(false);
    while(buf.n<tdc*8){buf.put(0xEC,8);if(buf.n<tdc*8)buf.put(0x11,8);}

    var data=new Array(tot),idx=0;

  function buildMatrix(tn,mp,data){
    var mc=tn*4+17,m=[];

    for(var i=0;i<pos.length;i++)for(var j=0;j<pos.length;j++){var rr=pos[i],cc=pos[j];if(m[rr][cc]!==null)continue;for(var dr=-2;dr<=2;dr++)for(var dc2=-2;dc2<=2;dc2++)m[rr+dr][cc+dc2]=(dr===-2||dr===2||dc2===-2||dc2===2||(dr===0&&dc2===0));}

    if(tn>=7){var tnb=bchTN(tn);for(var i=0;i<18;i++){var v=!!(tnb>>i&1);m[Math.floor(i/3)][i%3+mc-11]=v;m[i%3+mc-11][Math.floor(i/3)]=v;}}
    var inc=-1,row=mc-1,bi=7,by=0;
    for(var col=mc-1;col>0;col-=2){
      if(col===6)col--;

  function lp(m,mc){var t=0;for(var r=0;r<mc-1;r++)for(var c=0;c<mc-1;c++){var cnt=(m[r][c]?1:0)+(m[r+1][c]?1:0)+(m[r][c+1]?1:0)+(m[r+1][c+1]?1:0);if(cnt===0||cnt===4)t+=3;}return t;}
  function bestMask(tn,data){var best=0,bl=1e9;for(var i=0;i<8;i++){var mat=buildMatrix(tn,i,data),mc2=tn*4+17;var l=lp(mat,mc2);if(l<bl){bl=l;best=i;}}return best;}

    l.push('END:VCARD');return l.join('\r\n');

      var bWa=document.createElement('button');bWa.type='button';bWa.className='cta cta-wa';
      bWa.title='Compartir tarjeta por WhatsApp';
      bWa.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.852L.057 23.571a.75.75 0 0 0 .916.932l5.909-1.548A11.943 11.943 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.726 9.726 0 0 1-4.961-1.355l-.355-.212-3.683.965.981-3.588-.232-.369A9.722 9.722 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg> WhatsApp';
      bWa.addEventListener('click',function(){
        var html=generatePersonHTML(p);
        var nombre=p.nombre+(p.apellido?' '+p.apellido:'');

        /* Intentar Web Share API (funciona en móvil con archivo adjunto) */
        if(navigator.share && navigator.canShare){
          var file=new File([html],'tarjeta_'+slug(p)+'.html',{type:'text/html'});
          if(navigator.canShare({files:[file]})){
            navigator.share({
              files:[file],
              title:'Tarjeta digital — '+nombre,
              text:'Hola '+p.nombre+', te comparto tu tarjeta digital. Ábrela en el navegador para ver tu QR y compartir tu contacto 👇'
            }).then(function(){
              toast('Compartido ✓');
            }).catch(function(e){
              if(e.name!=='AbortError')fallbackWa(p,nombre,html);
            });
            return;
          }
        }
        fallbackWa(p,nombre,html);
      });

      act.appendChild(bShare);
      act.appendChild(bWa);

      if(isAdmin){
        var bVcf=document.createElement('button');bVcf.type='button';bVcf.className='cta cta-green';
        bVcf.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> Contacto';
        bVcf.addEventListener('click',function(){dlBlob('contacto_'+slug(p)+'.vcf',vc,'text/vcard;charset=utf-8');toast('Contacto descargado');});

        var bEdit=document.createElement('button');bEdit.type='button';bEdit.className='cta cta-gray';
        bEdit.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar';
        bEdit.addEventListener('click',function(){openSheet(people[idx],idx);});

        var bDel=document.createElement('button');bDel.type='button';bDel.className='cta cta-red';
        bDel.setAttribute('aria-label','Eliminar');
        bDel.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>';
        bDel.addEventListener('click',function(){people.splice(idx,1);save();render();toast('Eliminado');});

        act.appendChild(bVcf);act.appendChild(bEdit);act.appendChild(bDel);
      }

      wrap.appendChild(card);wrap.appendChild(act);
      list.appendChild(wrap);
    });
  }

  render();
  setTimeout(function(){el('splash').classList.add('hide');},1000);
})();
</script>
</body>
</html>
